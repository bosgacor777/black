<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --surface-color: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #38bdf8; --ai-color: #a855f7; --border: #334155; --easy: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
        .container { width: 100%; max-width: 600px; }
        .input-field { width:100%; padding:1rem; margin-bottom:1rem; background:var(--surface-color); border:1px solid var(--border); color:white; border-radius:10px; }
        .btn-ai { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--ai-color); color: #c084fc; padding: 0.8rem; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; margin-bottom: 1.5rem; }
        .btn-submit { width:100%; padding:1rem; border-radius:10px; border:none; background:var(--primary); font-weight:700; cursor: pointer; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .tabs { display: flex; background: var(--surface-color); padding: 0.5rem; border-radius: 12px; margin-bottom: 2rem; }
        .tab-btn { flex: 1; border: none; color: var(--text-muted); padding: 0.75rem; font-weight: 600; cursor: pointer; background: transparent; }
        .tab-btn.active { background: var(--bg-color); color: var(--primary); border-radius: 8px; }
        .vocab-card { background: var(--surface-color); border: 1px solid var(--border); padding: 1.25rem; border-radius: 12px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('list')">List</button>
            <button class="tab-btn" onclick="switchTab('add')">Tambah</button>
        </div>
        <main id="list" class="tab-content active"><div id="vocabListContainer"></div></main>
        <main id="add" class="tab-content">
            <input type="text" id="apiKey" placeholder="🔑 Paste API Key (AQ...)" class="input-field">
            <form id="addForm" onsubmit="addVocab(event)">
                <input type="text" id="word" placeholder="Kata (Inggris)" required class="input-field">
                <button type="button" id="btnAI" class="btn-ai" onclick="autoFillAI()">✨ Auto-Fill AI</button>
                <input type="text" id="pronunciation" placeholder="Cara Baca" required class="input-field">
                <input type="text" id="meaning" placeholder="Arti" required class="input-field">
                <textarea id="example" placeholder="Contoh Kalimat" class="input-field" rows="2"></textarea>
                <button type="submit" class="btn-submit">Simpan</button>
            </form>
        </main>
    </div>

    <script>
        let vocabs = JSON.parse(localStorage.getItem('myVocabs')) || [];
        document.getElementById('apiKey').value = localStorage.getItem('geminiApiKey') || '';

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function autoFillAI() {
            const word = document.getElementById('word').value.trim();
            let apiKey = document.getElementById('apiKey').value.trim();
            const btnAI = document.getElementById('btnAI');

            if (!word || !apiKey) { alert('Isi Kata dan API Key!'); return; }
            localStorage.setItem('geminiApiKey', apiKey);
            btnAI.innerText = '⏳ Memproses...';
            btnAI.disabled = true;

            try {
                // FIX MODEL: Menggunakan 'latest' agar pasti terbaca oleh semua Key AQ
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-goog-api-key': apiKey 
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Berikan cara baca (indonesia), arti, dan contoh kalimat untuk kata "${word}". Jawab HANYA dalam format JSON: {"pronunciation": "...", "meaning": "...", "example": "..."}` }] }]
                    })
                });

                if (!response.ok) throw new Error("API menolak akses. Cek apakah API Key sudah aktif.");
                
                const data = await response.json();
                let aiText = data.candidates[0].content.parts[0].text.replace(/```json\s*/i, '').replace(/```\s*$/, '').trim();
                const result = JSON.parse(aiText);

                document.getElementById('pronunciation').value = result.pronunciation;
                document.getElementById('meaning').value = result.meaning;
                document.getElementById('example').value = result.example;
            } catch (error) {
                alert(`Error: ${error.message}`);
            } finally {
                btnAI.innerText = '✨ Auto-Fill AI';
                btnAI.disabled = false;
            }
        }
    </script>
</body>
</html>
