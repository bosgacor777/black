<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --ai-color: #a855f7;
            --border: #334155;
            --easy: #10b981;
            --medium: #3b82f6;
            --hard: #ef4444;
            --size-title: 2rem; --size-word: 2rem; --size-meaning: 1.4rem; --size-body: 1rem; --size-small: 0.85rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; font-size: var(--size-body); }
        .container { width: 100%; max-width: 600px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .top-bar h1 { font-size: var(--size-title); font-weight: 700; background: linear-gradient(to right, var(--primary), var(--ai-color)); -webkit-background-clip: text; color: transparent; }
        .tabs { display: flex; background: var(--surface-color); padding: 0.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--border); }
        .tab-btn { flex: 1; border: none; color: var(--text-muted); padding: 0.75rem; font-weight: 600; cursor: pointer; border-radius: 8px; background: transparent; font-size: var(--size-body); }
        .tab-btn.active { background: var(--bg-color); color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-field { width:100%; padding:1rem; margin-bottom:1rem; background:var(--surface-color); border:1px solid var(--border); color:white; border-radius:10px; font-size: var(--size-body); }
        .btn-ai { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--ai-color); color: #c084fc; padding: 0.8rem; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; margin-bottom: 1.5rem; }
        .btn-submit { width:100%; padding:1rem; border-radius:10px; border:none; background:var(--primary); font-weight:700; cursor: pointer; }
        .quiz-card { background: var(--surface-color); border: 1px solid var(--border); padding: 2.5rem 2rem; border-radius: 16px; text-align: center; margin-bottom: 1.5rem; }
        .vocab-card { background: var(--surface-color); border: 1px solid var(--border); padding: 1.25rem; border-radius: 12px; margin-bottom: 1rem; }
        .delete-btn { background: transparent; border: none; color: #ef4444; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar"><h1>VocabMaster AI</h1></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('list')">List</button>
            <button class="tab-btn" onclick="switchTab('add')">Tambah</button>
            <button class="tab-btn" onclick="switchTab('quiz')">Tes (SRS)</button>
        </div>
        <main id="list" class="tab-content active"><div id="vocabListContainer"></div></main>
        <main id="add" class="tab-content">
            <input type="text" id="apiKey" placeholder="🔑 Paste Gemini API Key (Berawalan AQ.)" class="input-field">
            <form id="addForm" onsubmit="addVocab(event)">
                <input type="text" id="word" placeholder="Kata (Inggris)" required class="input-field">
                <button type="button" id="btnAI" class="btn-ai" onclick="autoFillAI()">✨ Auto-Fill dengan AI</button>
                <input type="text" id="pronunciation" placeholder="Cara Baca" required class="input-field">
                <input type="text" id="meaning" placeholder="Arti" required class="input-field">
                <textarea id="example" placeholder="Contoh Kalimat" class="input-field" rows="2"></textarea>
                <button type="submit" class="btn-submit">Simpan Vocab</button>
            </form>
        </main>
        <main id="quiz" class="tab-content">
            <div class="quiz-card">
                <div class="quiz-word" id="qWord" style="font-size:2rem; font-weight:700; color:var(--primary);">--</div>
                <div id="qPronounce" style="color:var(--text-muted); font-style:italic; margin-bottom:2rem;">(--)</div>
                <div id="qMeaning" style="display:none; color:var(--easy); font-weight:600; margin-bottom:1rem;">--</div>
                <button id="btnReveal" onclick="revealAnswer()" style="width:100%; padding:1rem; border-radius:10px; border:none; background:var(--primary);">Buka Arti</button>
            </div>
        </main>
    </div>

    <script>
        let vocabs = JSON.parse(localStorage.getItem('myVocabs')) || [];
        document.getElementById('apiKey').value = localStorage.getItem('geminiApiKey') || '';

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function autoFillAI() {
            const word = document.getElementById('word').value.trim();
            let apiKey = document.getElementById('apiKey').value.trim();
            const btnAI = document.getElementById('btnAI');

            if (!word || !apiKey) { alert('Isi Kata dan API Key dulu!'); return; }
            localStorage.setItem('geminiApiKey', apiKey);
            btnAI.innerText = '⏳ Memproses...';
            btnAI.disabled = true;

            try {
                // FIXED URL: Menggunakan model latest yang paling kompatibel
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Berikan cara baca (Indonesia), arti, dan contoh kalimat untuk "${word}". Format JSON: {"pronunciation": "...", "meaning": "...", "example": "..."}` }] }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error.message);

                let aiText = data.candidates[0].content.parts[0].text.replace(/```json\s*/i, '').replace(/```\s*$/, '').trim();
                const result = JSON.parse(aiText);

                document.getElementById('pronunciation').value = result.pronunciation;
                document.getElementById('meaning').value = result.meaning;
                document.getElementById('example').value = result.example;
            } catch (error) {
                alert(`Error: ${error.message}`);
            } finally {
                btnAI.innerText = '✨ Auto-Fill dengan AI';
                btnAI.disabled = false;
            }
        }

        function addVocab(e) {
            e.preventDefault();
            vocabs.push({
                id: Date.now(),
                word: document.getElementById('word').value.trim(),
                pronunciation: document.getElementById('pronunciation').value.trim(),
                meaning: document.getElementById('meaning').value.trim(),
                example: document.getElementById('example').value.trim()
            });
            localStorage.setItem('myVocabs', JSON.stringify(vocabs));
            alert('Tersimpan!');
            document.getElementById('addForm').reset();
        }
    </script>
</body>
</html>
