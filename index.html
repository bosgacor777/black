<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Master - V1 V2 V3</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
            --success: #03dac6;
            --error: #cf6679;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            padding: 0 10px;
        }

        button {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button.active, button:hover {
            background-color: var(--primary-color);
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        /* Study Mode Styles */
        .pattern-group {
            background-color: var(--surface-color);
            margin-bottom: 20px;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .pattern-title {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th { color: var(--text-secondary); }

        /* Quiz Mode Styles */
        .quiz-card {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .verb-question {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .verb-meaning {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-style: italic;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .correct { color: var(--success); }
        .wrong { color: var(--error); }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 600px) {
            .input-group {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Verb Master</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Hafal V1 V2 V3 dengan Pola & Active Recall</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('study')">📚 Belajar</button>
        <button class="tab-btn" onclick="switchTab('quiz')">🎯 Latihan</button>
        <button class="tab-btn" onclick="switchTab('add')">➕ Tambah</button>
    </div>

    <div class="container">
        <!-- TABS BELAJAR -->
        <div id="study" class="section active">
            <div id="study-container"></div>
        </div>

        <!-- TABS LATIHAN -->
        <div id="quiz" class="section">
            <div class="quiz-card">
                <p style="color: var(--text-secondary)">Apa V2 dan V3 dari kata ini?</p>
                <div class="verb-question" id="q-v1">loading...</div>
                <div class="verb-meaning" id="q-arti">loading...</div>
                
                <div class="input-group">
                    <input type="text" id="ans-v2" placeholder="Ketik Verb 2..." autocomplete="off">
                    <input type="text" id="ans-v3" placeholder="Ketik Verb 3..." autocomplete="off">
                </div>
                
                <button onclick="checkAnswer()" style="width: 100%; background-color: var(--primary-color); color: #000;">Cek Jawaban</button>
                <button onclick="nextQuestion()" style="width: 100%; margin-top: 10px;">Lewati / Ganti Kata</button>
                
                <div id="quiz-feedback" class="feedback"></div>
            </div>
        </div>

        <!-- TABS TAMBAH KATA -->
        <div id="add" class="section">
            <div class="quiz-card">
                <h2 style="margin-bottom: 20px; color: var(--primary-color);">Tambah Kosakata Baru</h2>
                
                <div class="form-group">
                    <label>Verb 1 (Infinitive)</label>
                    <input type="text" id="new-v1" placeholder="Contoh: swim">
                </div>
                <div class="form-group">
                    <label>Verb 2 (Past Simple)</label>
                    <input type="text" id="new-v2" placeholder="Contoh: swam">
                </div>
                <div class="form-group">
                    <label>Verb 3 (Past Participle)</label>
                    <input type="text" id="new-v3" placeholder="Contoh: swum">
                </div>
                <div class="form-group">
                    <label>Arti Kata</label>
                    <input type="text" id="new-arti" placeholder="Contoh: berenang">
                </div>
                <div class="form-group">
                    <label>Kelompok Pola (Bebas)</label>
                    <input type="text" id="new-pola" placeholder="Contoh: Pola i-a-u">
                </div>
                
                <button onclick="addWord()" style="width: 100%; background-color: var(--primary-color); color: #000;">Simpan Kata</button>
                <div id="add-feedback" class="feedback" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Data Default (Sebagian dari kata yang kita bahas, sisanya bisa ditambah sendiri)
        const defaultVerbs = [
            {v1: "begin", v2: "began", v3: "begun", arti: "memulai", pola: "Pola i-a-u"},
            {v1: "drink", v2: "drank", v3: "drunk", arti: "meminum", pola: "Pola i-a-u"},
            {v1: "ring", v2: "rang", v3: "rung", arti: "berbunyi", pola: "Pola i-a-u"},
            {v1: "cut", v2: "cut", v3: "cut", arti: "memotong", pola: "Kembar Tiga"},
            {v1: "put", v2: "put", v3: "put", arti: "meletakkan", pola: "Kembar Tiga"},
            {v1: "read", v2: "read", v3: "read", arti: "membaca", pola: "Kembar Tiga"},
            {v1: "come", v2: "came", v3: "come", arti: "datang", pola: "Sandwich (V1=V3)"},
            {v1: "run", v2: "ran", v3: "run", arti: "lari", pola: "Sandwich (V1=V3)"},
            {v1: "know", v2: "knew", v3: "known", arti: "mengetahui", pola: "Akhiran ew-own"},
            {v1: "fly", v2: "flew", v3: "flown", arti: "terbang", pola: "Akhiran ew-own"},
            {v1: "buy", v2: "bought", v3: "bought", arti: "membeli", pola: "Akhiran ought/aught"},
            {v1: "think", v2: "thought", v3: "thought", arti: "berpikir", pola: "Akhiran ought/aught"},
            {v1: "sleep", v2: "slept", v3: "slept", arti: "tidur", pola: "V2 & V3 Sama (Akhir T)"},
            {v1: "feel", v2: "felt", v3: "felt", arti: "merasa", pola: "V2 & V3 Sama (Akhir T)"},
            {v1: "speak", v2: "spoke", v3: "spoken", arti: "berbicara", pola: "Pola o-en"},
            {v1: "eat", v2: "ate", v3: "eaten", arti: "makan", pola: "Akhiran -en"},
            {v1: "take", v2: "took", v3: "taken", arti: "mengambil", pola: "Akhiran -en"}
        ];

        // Inisialisasi data dari LocalStorage atau pakai default
        let verbsData = JSON.parse(localStorage.getItem('verbMasterData'));
        if (!verbsData || verbsData.length === 0) {
            verbsData = defaultVerbs;
            saveData();
        }

        let currentQuizWord = null;

        // Fungsi Ganti Tab
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if(tabId === 'study') renderStudyData();
            if(tabId === 'quiz') nextQuestion();
        }

        // Render Data untuk Belajar
        function renderStudyData() {
            const container = document.getElementById('study-container');
            container.innerHTML = '';

            // Mengelompokkan berdasarkan pola
            const groupedData = verbsData.reduce((acc, verb) => {
                if (!acc[verb.pola]) acc[verb.pola] = [];
                acc[verb.pola].push(verb);
                return acc;
            }, {});

            for (const pola in groupedData) {
                let tableHTML = `
                    <div class="pattern-group">
                        <div class="pattern-title">${pola}</div>
                        <table>
                            <tr>
                                <th>V1</th><th>V2</th><th>V3</th><th>Arti</th>
                            </tr>`;
                
                groupedData[pola].forEach(v => {
                    tableHTML += `
                        <tr>
                            <td><strong>${v.v1}</strong></td>
                            <td>${v.v2}</td>
                            <td>${v.v3}</td>
                            <td>${v.arti}</td>
                        </tr>`;
                });

                tableHTML += `</table></div>`;
                container.innerHTML += tableHTML;
            }
        }

        // --- Logika Quiz ---
        function nextQuestion() {
            const randomIndex = Math.floor(Math.random() * verbsData.length);
            currentQuizWord = verbsData[randomIndex];
            
            document.getElementById('q-v1').innerText = currentQuizWord.v1;
            document.getElementById('q-arti').innerText = `(${currentQuizWord.arti})`;
            
            document.getElementById('ans-v2').value = '';
            document.getElementById('ans-v3').value = '';
            document.getElementById('quiz-feedback').innerText = '';
            document.getElementById('ans-v2').focus();
        }

        function checkAnswer() {
            const ansV2 = document.getElementById('ans-v2').value.trim().toLowerCase();
            const ansV3 = document.getElementById('ans-v3').value.trim().toLowerCase();
            const feedback = document.getElementById('quiz-feedback');

            if (ansV2 === currentQuizWord.v2 && ansV3 === currentQuizWord.v3) {
                feedback.innerHTML = `<span class="correct">Tepat Sekali! 🎉<br> ${currentQuizWord.v1} - ${currentQuizWord.v2} - ${currentQuizWord.v3}</span>`;
                setTimeout(nextQuestion, 2000);
            } else {
                feedback.innerHTML = `<span class="wrong">Masih kurang tepat, coba lagi ya! 🤔</span>`;
            }
        }

        // --- Logika Tambah Kata ---
        function addWord() {
            const v1 = document.getElementById('new-v1').value.trim().toLowerCase();
            const v2 = document.getElementById('new-v2').value.trim().toLowerCase();
            const v3 = document.getElementById('new-v3').value.trim().toLowerCase();
            const arti = document.getElementById('new-arti').value.trim();
            const pola = document.getElementById('new-pola').value.trim();
            const feedback = document.getElementById('add-feedback');

            if(!v1 || !v2 || !v3 || !arti || !pola) {
                feedback.innerHTML = `<span class="wrong">Semua kolom wajib diisi!</span>`;
                return;
            }

            verbsData.push({v1, v2, v3, arti, pola});
            saveData();

            feedback.innerHTML = `<span class="correct">Kata berhasil ditambahkan! ✅</span>`;
            
            // Clear form
            document.getElementById('new-v1').value = '';
            document.getElementById('new-v2').value = '';
            document.getElementById('new-v3').value = '';
            document.getElementById('new-arti').value = '';
            document.getElementById('new-pola').value = '';
        }

        function saveData() {
            localStorage.setItem('verbMasterData', JSON.stringify(verbsData));
        }

        // Render pertama kali
        renderStudyData();
    </script>
</body>
</html>
