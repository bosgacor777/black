    <title>VocabMaster AI - Fixed</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --ai-color: #a855f7;
            --border: #334155;
            --easy: #10b981;
            --medium: #3b82f6;
            --hard: #ef4444;
            --size-title: 2rem; --size-word: 2rem; --size-meaning: 1.4rem; --size-body: 1rem; --size-small: 0.85rem;
        }
        body.font-small { --size-title: 1.5rem; --size-word: 1.5rem; --size-meaning: 1.1rem; --size-body: 0.85rem; --size-small: 0.75rem; }
        body.font-large { --size-title: 2.5rem; --size-word: 2.5rem; --size-meaning: 1.8rem; --size-body: 1.15rem; --size-small: 0.95rem; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; font-size: var(--size-body); }
        .container { width: 100%; max-width: 600px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .top-bar h1 { font-size: var(--size-title); font-weight: 700; background: linear-gradient(to right, var(--primary), var(--ai-color)); -webkit-background-clip: text; color: transparent; }
        .font-selector { display: flex; background: var(--surface-color); padding: 0.25rem; border-radius: 8px; border: 1px solid var(--border); gap: 0.25rem; }
        .font-btn { background: transparent; border: none; color: var(--text-muted); padding: 0.35rem 0.65rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; border-radius: 6px; }
        .font-btn.active { background: var(--bg-color); color: var(--primary); }
        .tabs { display: flex; background: var(--surface-color); padding: 0.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--border); }
        .tab-btn { flex: 1; border: none; color: var(--text-muted); padding: 0.75rem; font-weight: 600; cursor: pointer; border-radius: 8px; background: transparent; font-size: var(--size-body); }
        .tab-btn.active { background: var(--bg-color); color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-field { width:100%; padding:1rem; margin-bottom:1rem; background:var(--surface-color); border:1px solid var(--border); color:white; border-radius:10px; font-size: var(--size-body); }
        .input-field:focus { outline: none; border-color: var(--primary); }
        .btn-ai { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--ai-color); color: #c084fc; padding: 0.8rem; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; margin-bottom: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; font-size: var(--size-body); }
        .btn-ai:disabled { opacity: 0.5; }
        .quiz-card { background: var(--surface-color); border: 1px solid var(--border); padding: 2.5rem 2rem; border-radius: 16px; text-align: center; margin-bottom: 1.5rem; }
        .quiz-word { font-size: var(--size-word); font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; }
        .quiz-pronounce { color: var(--text-muted); font-style: italic; margin-bottom: 2rem; font-size: var(--size-body); }
        .quiz-meaning { font-size: var(--size-meaning); font-weight: 600; margin-bottom: 1rem; display: none; color: var(--easy); }
        .quiz-example { font-size: var(--size-body); color: var(--text-muted); font-style: italic; display: none; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg-color); border-radius: 8px; }
