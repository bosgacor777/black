<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Master - Bug Free Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
            --success: #03dac6;
            --error: #cf6679;
            --warning: #f39c12;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            padding: 0 10px;
        }

        button {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button.active, button:hover {
            background-color: var(--primary-color);
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        /* Study Mode Styles */
        .pattern-group {
            background-color: var(--surface-color);
            margin-bottom: 20px;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .pattern-title {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th { color: var(--text-secondary); }

        .ipa-text {
            color: var(--primary-color);
            font-size: 0.8rem;
            display: block;
            margin-top: 2px;
            font-family: monospace;
        }
        
        .audio-btn {
            cursor: pointer;
            font-size: 1.1rem;
            margin-left: 5px;
            display: inline-block;
            transition: transform 0.2s;
        }

        .audio-btn:active {
            transform: scale(0.8);
        }

        /* Quiz & Flashcard Mode Styles */
        .quiz-card {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .verb-question {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .verb-ipa-main {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-family: monospace;
        }

        .verb-meaning {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-style: italic;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .correct { color: var(--success); }
        .wrong { color: var(--error); }

        /* Anki Buttons */
        .anki-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .anki-btn-group button {
            flex: 1;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .anki-btn-group button small {
            font-weight: normal;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            text-align: left;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 600px) {
            .input-group {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Verb Master</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Master V1 V2 V3 with Audio, Patterns & Anki SRS</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'study')">📚 Study</button>
        <button class="tab-btn" onclick="switchTab(event, 'quiz')">🎯 Typing Quiz</button>
        <button class="tab-btn" onclick="switchTab(event, 'flashcard')">🃏 Anki Flashcard</button>
        <button class="tab-btn" onclick="switchTab(event, 'add')">➕ Add Word</button>
    </div>

    <div class="container">
        <!-- STUDY TAB -->
        <div id="study" class="section active">
            <div id="study-container"></div>
        </div>

        <!-- TYPING QUIZ TAB -->
        <div id="quiz" class="section">
            <div class="quiz-card">
                <p style="color: var(--text-secondary)">What is the V2 and V3 of this word?</p>
                <div class="verb-question">
                    <span id="q-v1">loading...</span> 
                    <span class="audio-btn" id="q-audio-btn">🔊</span>
                </div>
                <div class="verb-ipa-main" id="q-ipa">/loading/</div>
                <div class="verb-meaning" id="q-arti">loading...</div>
                
                <div class="input-group">
                    <input type="text" id="ans-v2" placeholder="Type Verb 2..." autocomplete="off">
                    <input type="text" id="ans-v3" placeholder="Type Verb 3..." autocomplete="off">
                </div>
                
                <button onclick="checkAnswer()" style="width: 100%; background-color: var(--primary-color); color: #000;">Check Answer</button>
                <button onclick="nextQuestion()" style="width: 100%; margin-top: 10px;">Skip / Next Word</button>
                
                <div id="quiz-feedback" class="feedback"></div>
                <p id="quiz-counter" style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 10px;"></p>
            </div>
        </div>

        <!-- FLASHCARD TAB (ANKI MODE) -->
        <div id="flashcard" class="section">
            <div class="quiz-card">
                <p style="color: var(--text-secondary)">Guess the V2 and V3 in your head, then reveal!</p>
                <div class="verb-question">
                    <span id="fc-v1">loading...</span>
                    <span class="audio-btn" id="fc-audio-v1">🔊</span>
                </div>
                <div class="verb-ipa-main" id="fc-ipa">/loading/</div>
                <div class="verb-meaning" id="fc-arti">loading...</div>
                
                <!-- Answer Box -->
                <div id="fc-answer-box" style="display: none; margin-bottom: 20px; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-color);">
                    <div style="font-size: 1.5rem; color: var(--success); font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 5px;">
                        <span id="fc-v2"></span> <span class="audio-btn" id="fc-audio-v2">🔊</span> - 
                        <span id="fc-v3"></span> <span class="audio-btn" id="fc-audio-v3">🔊</span>
                    </div>
                    <div style="font-size: 1rem; color: var(--primary-color); font-family: monospace; margin-top: 5px;">
                        <span id="fc-ipa2"></span> - <span id="fc-ipa3"></span>
                    </div>
                </div>
                
                <button id="fc-btn-show" onclick="showFlashcard()" style="width: 100%; background-color: var(--primary-color); color: #000;">Reveal Answer</button>
                
                <!-- Anki Buttons -->
                <div id="fc-anki-btns" class="anki-btn-group" style="display: none;">
                    <button onclick="answerFlashcard('again')" style="background-color: var(--error); color: white;">🔴 Again <small>(1 min)</small></button>
                    <button onclick="answerFlashcard('good')" style="background-color: var(--warning); color: white;">🟡 Good <small>(10 min)</small></button>
                    <button onclick="answerFlashcard('easy')" style="background-color: var(--success); color: #000;">🟢 Easy <small>(1 day)</small></button>
                </div>
                <p id="fc-stats" style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 15px;"></p>
            </div>
        </div>

        <!-- ADD WORD TAB -->
        <div id="add" class="section">
            <div class="quiz-card">
                <h2 style="margin-bottom: 20px; color: var(--primary-color);">Add New Vocabulary</h2>
                
                <div class="form-group">
                    <label>Verb 1 (Infinitive)</label>
                    <input type="text" id="new-v1" placeholder="Example: jump">
                </div>
                <div class="form-group">
                    <label>Verb 2 & 3</label>
                    <div class="input-group" style="margin-bottom: 0;">
                        <input type="text" id="new-v2" placeholder="Verb 2...">
                        <input type="text" id="new-v3" placeholder="Verb 3...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Meaning & Pattern Group</label>
                    <div class="input-group" style="margin-bottom: 0;">
                        <input type="text" id="new-arti" placeholder="Example: melompat">
                        <input type="text" id="new-pola" placeholder="Example: Regular Verbs">
                    </div>
                </div>
                
                <button onclick="addWord()" style="width: 100%; background-color: var(--primary-color); color: #000;">Save Word</button>
                <div id="add-feedback" class="feedback" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

                window.speechSynthesis.speak(utterance);

                alert("Sorry, your browser doesn't support text-to-speech audio.");

            {v1: "be", ipaV1: "/biː/", v2: "was/were", ipaV2: "/wɑːz/", v3: "been", ipaV3: "/biːn/", arti: "ada / adalah", pola: "12. Pola Unik / Berubah Total"},
            {v1: "do", ipaV1: "/duː/", v2: "did", ipaV2: "/dɪd/", v3: "done", ipaV3: "/dʌn/", arti: "melakukan", pola: "12. Pola Unik / Berubah Total"},
            {v1: "go", ipaV1: "/ɡoʊ/", v2: "went", ipaV2: "/went/", v3: "gone", ipaV3: "/ɡɑːn/", arti: "pergi", pola: "12. Pola Unik / Berubah Total"},
            {v1: "lie", ipaV1: "/laɪ/", v2: "lay", ipaV2: "/leɪ/", v3: "lain", ipaV3: "/leɪn/", arti: "berbaring", pola: "12. Pola Unik / Berubah Total"}
        ];

        // MENGGUNAKAN KEY BARU (V5) UNTUK MENGHINDARI BENTROKAN DATA LAMA
        const STORAGE_KEY = 'verbMasterV5';
        let verbsData = [];
        
        try {
            let savedStr = localStorage.getItem(STORAGE_KEY);
            if (savedStr) {
                verbsData = JSON.parse(savedStr);
            }
        } catch (error) {
            console.error("Local Storage Error:", error);
        }
        
        if (!verbsData || verbsData.length === 0) {
            // Melakukan kloning agar tidak memodifikasi data default secara langsung
            verbsData = JSON.parse(JSON.stringify(defaultVerbs)); 
        }
        
        // Memastikan properti nextReview ada
        verbsData.forEach(v => {
            if (typeof v.nextReview === 'undefined') {
                v.nextReview = 0; 
            }
        });
        saveData();

        // MENGGUNAKAN event.currentTarget AGAR TOMBOL BERFUNGSI NORMAL DI HP
        function switchTab(e, tabId) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            if (e && e.currentTarget) {
                e.currentTarget.classList.add('active');
            }
            
            if(tabId === 'study') renderStudyData();
            if(tabId === 'quiz') nextQuestion();
            if(tabId === 'flashcard') nextFlashcard(); 
        }

        // --- STUDY ---
        function renderStudyData() {
            const container = document.getElementById('study-container');
            container.innerHTML = '';

            const groupedData = verbsData.reduce((acc, verb) => {
                if (!acc[verb.pola]) acc[verb.pola] = [];
                acc[verb.pola].push(verb);
                return acc;
            }, {});

            for (const pola in groupedData) {
                let tableHTML = `
                    <div class="pattern-group">
                        <div class="pattern-title">${pola}</div>
                        <table>
                            <tr>
                                <th>V1</th><th>V2</th><th>V3</th><th>Meaning</th>
                            </tr>`;
                
                groupedData[pola].forEach(v => {
                    let renderIpa1 = v.ipaV1 ? `<span class="ipa-text">${v.ipaV1}</span>` : '';
                    let renderIpa2 = v.ipaV2 ? `<span class="ipa-text">${v.ipaV2}</span>` : '';
                    let renderIpa3 = v.ipaV3 ? `<span class="ipa-text">${v.ipaV3}</span>` : '';

                    tableHTML += `
                        <tr>
                            <td><strong>${v.v1}</strong> <span class="audio-btn" onclick="playAudio('${v.v1}')">🔊</span>${renderIpa1}</td>
                            <td>${v.v2} <span class="audio-btn" onclick="playAudio('${v.v2}')">🔊</span>${renderIpa2}</td>
                            <td>${v.v3} <span class="audio-btn" onclick="playAudio('${v.v3}')">🔊</span>${renderIpa3}</td>
                            <td>${v.arti}</td>
                        </tr>`;
                });

                tableHTML += `</table></div>`;
                container.innerHTML += tableHTML;
            }
        }

        // --- TYPING QUIZ (BAG SHUFFLE) ---
        let currentQuizWord = null;
        let isWaiting = false;
        let quizBag = [];

        function nextQuestion() {
            isWaiting = false;
            
            if (quizBag.length === 0) {
                quizBag = verbsData.map((_, i) => i).sort(() => Math.random() - 0.5);
            }
            
            let nextIndex = quizBag.pop();
            currentQuizWord = verbsData[nextIndex];
            
            document.getElementById('q-v1').innerText = currentQuizWord.v1;
            document.getElementById('q-audio-btn').setAttribute('onclick', `playAudio('${currentQuizWord.v1}')`);
            document.getElementById('q-ipa').innerText = currentQuizWord.ipaV1 ? currentQuizWord.ipaV1 : "";
            document.getElementById('q-arti').innerText = `(${currentQuizWord.arti})`;
            document.getElementById('quiz-counter').innerText = `Words left in deck: ${quizBag.length}`;
            
            document.getElementById('ans-v2').value = '';
            document.getElementById('ans-v3').value = '';
            document.getElementById('quiz-feedback').innerText = '';
            document.getElementById('ans-v2').focus();
        }

        function checkAnswer() {
            if (isWaiting) return;

            let ansV2 = document.getElementById('ans-v2').value.trim().toLowerCase();
            let ansV3 = document.getElementById('ans-v3').value.trim().toLowerCase();
            const feedback = document.getElementById('quiz-feedback');

            let isV2Correct = (ansV2 === currentQuizWord.v2);
            if (currentQuizWord.v2 === "was/were" && (ansV2 === "was" || ansV2 === "were" || ansV2 === "was/were")) {
                isV2Correct = true;
            }

            let ipa2 = currentQuizWord.ipaV2 ? `<br><span style="font-size: 0.9rem; font-family: monospace;">${currentQuizWord.ipaV2} - ${currentQuizWord.ipaV3}</span>` : '';

            if (isV2Correct && ansV3 === currentQuizWord.v3) {
                feedback.innerHTML = `<span class="correct">Spot On! 🎉<br> ${currentQuizWord.v1} - ${currentQuizWord.v2} - ${currentQuizWord.v3} ${ipa2}</span>`;
                isWaiting = true;
                setTimeout(nextQuestion, 2200);
            } else {
                feedback.innerHTML = `<span class="wrong">Not quite! 😅<br>Correct: <strong>${currentQuizWord.v2}</strong> - <strong>${currentQuizWord.v3}</strong> ${ipa2}</span>`;
                isWaiting = true;
                setTimeout(nextQuestion, 3500); 
            }
        }

        // --- FLASHCARD (ANKI SRS) ---
        let currentFcWord = null; 

        function nextFlashcard() {
            let now = Date.now();
            
            let dueCards = verbsData.filter(v => v.nextReview <= now);
            
            document.getElementById('fc-stats').innerText = `Cards to review now: ${dueCards.length} / ${verbsData.length}`;

            if (dueCards.length === 0) {
                dueCards = [verbsData.reduce((prev, curr) => prev.nextReview < curr.nextReview ? prev : curr)];
                document.getElementById('fc-stats').innerHTML = `<span class="correct">All caught up! Next card in queue...</span>`;
            }

            const randomIndex = Math.floor(Math.random() * dueCards.length);
            currentFcWord = dueCards[randomIndex];
            
            document.getElementById('fc-v1').innerText = currentFcWord.v1;
            document.getElementById('fc-audio-v1').setAttribute('onclick', `playAudio('${currentFcWord.v1}')`);
            
            document.getElementById('fc-ipa').innerText = currentFcWord.ipaV1 ? currentFcWord.ipaV1 : "";
            document.getElementById('fc-arti').innerText = `(${currentFcWord.arti})`;
            
            document.getElementById('fc-answer-box').style.display = 'none';
            document.getElementById('fc-btn-show').style.display = 'block';
            document.getElementById('fc-anki-btns').style.display = 'none';
        }

        function showFlashcard() {
            document.getElementById('fc-v2').innerText = currentFcWord.v2;
            document.getElementById('fc-audio-v2').setAttribute('onclick', `playAudio('${currentFcWord.v2}')`);
            
            document.getElementById('fc-v3').innerText = currentFcWord.v3;
            document.getElementById('fc-audio-v3').setAttribute('onclick', `playAudio('${currentFcWord.v3}')`);
            
            document.getElementById('fc-ipa2').innerText = currentFcWord.ipaV2 ? currentFcWord.ipaV2 : "";
            document.getElementById('fc-ipa3').innerText = currentFcWord.ipaV3 ? currentFcWord.ipaV3 : "";
            
            document.getElementById('fc-answer-box').style.display = 'block';
            document.getElementById('fc-btn-show').style.display = 'none';
            document.getElementById('fc-anki-btns').style.display = 'flex';
        }

        function answerFlashcard(quality) {
            let now = Date.now();
            
            if (quality === 'again') {
                currentFcWord.nextReview = now + (60 * 1000); 
            } else if (quality === 'good') {
                currentFcWord.nextReview = now + (10 * 60 * 1000); 
            } else if (quality === 'easy') {
                currentFcWord.nextReview = now + (24 * 60 * 60 * 1000); 
            }
            
            saveData();
            nextFlashcard();
        }

        // --- ADD WORD ---
        function addWord() {
            const v1 = document.getElementById('new-v1').value.trim().toLowerCase();
            const v2 = document.getElementById('new-v2').value.trim().toLowerCase();
            const v3 = document.getElementById('new-v3').value.trim().toLowerCase();
            const arti = document.getElementById('new-arti').value.trim();
            const pola = document.getElementById('new-pola').value.trim();
            const feedback = document.getElementById('add-feedback');

            if(!v1 || !v2 || !v3 || !arti || !pola) {
                feedback.innerHTML = `<span class="wrong">Please fill in all the fields!</span>`;
                return;
            }

            verbsData.push({v1, v2, v3, arti, pola, ipaV1: "", ipaV2: "", ipaV3: "", nextReview: 0});
            saveData();

            feedback.innerHTML = `<span class="correct">Word successfully added! ✅</span>`;
            
            document.getElementById('new-v1').value = '';
            document.getElementById('new-v2').value = '';
            document.getElementById('new-v3').value = '';
            document.getElementById('new-arti').value = '';
            document.getElementById('new-pola').value = '';
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(verbsData));
            } catch (error) {
                console.error("Gagal menyimpan data:", error);
            }
        }

        renderStudyData();
    </script>
</body>
</html>
