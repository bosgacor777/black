<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Subtitle Player ala English by Jay</title>
    <style>
        /* Desain Latar Belakang dan Layout */
        body {
            background-color: #121212; /* Warna gelap seperti di gambar */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            margin: 0;
        }

        /* Desain Kolom Input URL */
        .controls {
            margin-bottom: 20px;
        }
        input {
            padding: 12px;
            width: 350px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
        }
        button {
            padding: 12px 20px;
            cursor: pointer;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Tempat Video YouTube */
        .video-container {
            width: 400px; /* Dibuat agak vertikal menyesuaikan gaya TikTok/Reels */
            height: 225px; 
            background: black;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
        }

        /* Desain Kotak Subtitle (Persis seperti di foto) */
        .subtitle-box {
            width: 360px;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            text-align: left;
            min-height: 100px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Desain Teks Bahasa Inggris */
        .sub-en {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        /* Desain Teks Bahasa Indonesia */
        .sub-id {
            font-size: 15px;
            color: #a0a0a0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="yt-id" value="dQw4w9WgXcQ" placeholder="Masukkan ID YouTube...">
        <button onclick="loadVideo()">Putar Video</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="subtitle-box">
        <div class="sub-en" id="text-en">Tekan putar untuk memulai video.</div>
        <div class="sub-id" id="text-id">Teks terjemahan akan muncul di sini.</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let timer;

        // DATA DUMMY SUBTITLE (Ini yang nantinya diganti oleh AI/Backend)
        // Format: { start: detik_mulai, end: detik_selesai, en: "Inggris", id: "Indonesia" }
        const subtitles = [
            { start: 0, end: 3, en: "Hi! I booked a room under the name J.", id: "Halo, saya sudah memesan kamar atas nama J." },
            { start: 3, end: 7, en: "Hi, it's 1 p.m. and my room is for 2 p.m.", id: "Halo, sekarang jam 1 siang dan kamar saya untuk jam 2 siang." },
            { start: 7, end: 12, en: "Could you please check if it is ready?", id: "Bisakah Anda mengecek apakah kamarnya sudah siap?" },
            { start: 12, end: 18, en: "Never gonna give you up, never gonna let you down.", id: "Tidak akan pernah menyerah padamu, tidak akan pernah mengecewakanmu." }
        ];

        // Fungsi bawaan YouTube untuk menyiapkan player
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: document.getElementById('yt-id').value, // ID video default
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Memuat ulang video jika tombol "Putar Video" ditekan
        function loadVideo() {
            const videoId = document.getElementById('yt-id').value;
            player.loadVideoById(videoId);
        }

        // Mengecek apakah video sedang diputar atau berhenti
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // Jalankan pengecekan waktu setiap 100 milidetik
                timer = setInterval(syncSubtitles, 100);
            } else {
                clearInterval(timer);
            }
        }

        // Fungsi utama untuk menyinkronkan waktu video dengan teks
        function syncSubtitles() {
            const currentTime = player.getCurrentTime();
            let textFound = false;

            for (let i = 0; i < subtitles.length; i++) {
                if (currentTime >= subtitles[i].start && currentTime <= subtitles[i].end) {
                    document.getElementById('text-en').innerText = subtitles[i].en;
                    document.getElementById('text-id').innerText = subtitles[i].id;
                    textFound = true;
                    break;
                }
            }

            // Jika tidak ada teks di detik tersebut, kosongkan atau beri teks default
            if (!textFound) {
                document.getElementById('text-en').innerText = "...";
                document.getElementById('text-id').innerText = "...";
            }
        }
    </script>
</body>
</html>
