<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VocabGacor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F2;
  --surface: #FFFFFF;
  --border: #E8E4DF;
  --border-focus: #6C63FF;

  --primary: #6C63FF;
  --primary-light: #EEF0FF;
  --primary-dark: #5146E0;

  --ok: #22C55E;
  --ok-bg: #F0FDF4;
  --ok-border: #86EFAC;

  --err: #EF4444;
  --err-bg: #FEF2F2;
  --err-border: #FCA5A5;

  --text: #1A1A2E;
  --text2: #6B7280;
  --muted: #9CA3AF;

  --gold: #F59E0B;

  --r: 14px;
  --rL: 20px;
  --rXL: 28px;

  --f: 'Plus Jakarta Sans', sans-serif;
  --fD: 'Lora', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--f);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.header {
  width: 100%;
  max-width: 480px;
  padding: 28px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.logo {
  font-family: var(--fD);
  font-size: 20px;
  font-style: italic;
  color: var(--text);
  letter-spacing: -0.3px;
}
.logo span { color: var(--primary); }

.theme-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, transform .15s;
  color: var(--text2);
}
.theme-btn:active { transform: scale(.9); }

/* ── WRAP ── */
.wrap {
  width: 100%;
  max-width: 480px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── PROGRESS ── */
.prog-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.prog-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #9B93FF);
  border-radius: 99px;
  width: 0%;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.prog-txt {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  white-space: nowrap;
  min-width: 52px;
  text-align: right;
}

/* ── STATS ROW ── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.stat {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 14px 10px 12px;
  text-align: center;
}
.stat-lbl {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}
.stat-val {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  color: var(--text);
}
.stat-val.c-primary { color: var(--primary); }
.stat-val.c-gold { color: var(--gold); }
.bump {
  animation: bump .3s cubic-bezier(.175,.885,.32,1.5);
}
@keyframes bump { 50% { transform: scale(1.22); } }

/* ── MAIN CARD ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--rXL);
  overflow: hidden;
  box-shadow: 0 2px 24px rgba(0,0,0,.06);
  transition: border-color .25s, box-shadow .25s;
}
.card.s-ok {
  border-color: var(--ok-border);
  box-shadow: 0 0 0 4px var(--ok-bg), 0 2px 24px rgba(0,0,0,.06);
}
.card.s-err {
  border-color: var(--err-border);
  box-shadow: 0 0 0 4px var(--err-bg), 0 2px 24px rgba(0,0,0,.06);
}

/* Word hero */
.word-hero {
  padding: 40px 28px 32px;
  text-align: center;
  border-bottom: 1.5px solid var(--border);
  background: linear-gradient(160deg, var(--primary-light) 0%, transparent 60%);
  position: relative;
}
.word-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 16px;
  opacity: .7;
}
#word {
  font-family: var(--fD);
  font-size: clamp(40px, 10vw, 58px);
  font-style: italic;
  font-weight: 700;
  letter-spacing: -1.5px;
  line-height: 1.1;
  color: var(--text);
  word-break: break-word;
  transition: opacity .15s, transform .15s;
}
#word.fade { opacity: 0; transform: translateY(8px); }

/* ── COMBO PILL ── */
.combo-pill {
  position: absolute;
  top: 14px; right: 14px;
  font-size: 11px;
  font-weight: 700;
  background: var(--gold);
  color: #fff;
  border-radius: 999px;
  padding: 4px 10px;
  opacity: 0;
  transform: scale(.8);
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.combo-pill.show { opacity: 1; transform: scale(1); }
.combo-pill.pop { animation: cpop .25s ease; }
@keyframes cpop { 40% { transform: scale(1.18); } 100% { transform: scale(1); } }

/* ── INPUT ZONE ── */
.input-zone { padding: 22px 22px 20px; }

.input-wrap { position: relative; margin-bottom: 6px; }
.inp-label {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  pointer-events: none;
  z-index: 2;
}
input#answer {
  width: 100%;
  padding: 15px 42px 15px 42px;
  font-family: var(--f);
  font-size: 16px;
  font-weight: 600;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  outline: none;
  caret-color: var(--primary);
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
input#answer::placeholder { color: var(--muted); font-weight: 400; font-size: 14px; }
input#answer:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
input#answer.i-ok {
  border-color: var(--ok) !important;
  color: var(--ok);
  background: var(--ok-bg) !important;
  box-shadow: 0 0 0 3px var(--ok-bg) !important;
}
input#answer.i-err {
  border-color: var(--err) !important;
  color: var(--err);
  background: var(--err-bg) !important;
  box-shadow: 0 0 0 3px var(--err-bg) !important;
  animation: shake .3s ease;
}
@keyframes shake {
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.inp-status {
  position: absolute;
  right: 13px; top: 50%;
  transform: translateY(-50%);
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity .2s;
}
.inp-status.vis { opacity: 1; }
.inp-status.ok { background: var(--ok); }
.inp-status.err { background: var(--err); }
.inp-status svg { width: 11px; height: 11px; }

.hint-row {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  height: 16px;
  transition: color .2s;
}

/* ── BUTTONS ── */
.btn-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-top: 16px;
}
.btn-main {
  font-family: var(--f);
  font-size: 14px;
  font-weight: 700;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 14px 20px;
  cursor: pointer;
  transition: background .18s, transform .1s;
  letter-spacing: .1px;
}
.btn-main:hover { background: var(--primary-dark); }
.btn-main:active { transform: scale(.97); }

.btn-skip {
  font-family: var(--f);
  font-size: 13px;
  font-weight: 600;
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 14px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: color .18s, border-color .18s;
}
.btn-skip:hover { color: var(--text); border-color: #C5BFC0; }
.btn-skip:active { transform: scale(.97); }

/* ── RESULT ── */
.result-area { margin-top: 14px; }
.rbox {
  border-radius: var(--r);
  padding: 13px 16px;
  animation: rIn .2s ease;
}
@keyframes rIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.rbox.ok { background: var(--ok-bg); border: 1.5px solid var(--ok-border); }
.rbox.err { background: var(--err-bg); border: 1.5px solid var(--err-border); }
.rbox.warn { background: #FFFBEB; border: 1.5px solid #FDE68A; text-align: center; }
.rlbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.rbox.ok .rlbl { color: var(--ok); }
.rbox.err .rlbl { color: var(--err); }
.rbox.warn .rlbl { color: #92400E; font-size: 12px; letter-spacing: 0; text-transform: none; margin: 0; }
.rans {
  font-size: 13px;
  line-height: 1.9;
  color: var(--text2);
  font-weight: 500;
}

/* ── MUSIC PANEL ── */
.music-panel {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--rL);
  padding: 18px 20px;
}
.music-header {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.music-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.tab {
  font-size: 12px;
  font-weight: 700;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  color: var(--text2);
  padding: 9px 12px;
  cursor: pointer;
  text-align: center;
  font-family: var(--f);
  transition: all .18s;
}
.tab.active {
  background: var(--primary-light);
  border-color: #C4C0FF;
  color: var(--primary);
}
.minput {
  width: 100%;
  padding: 11px 14px;
  font-family: var(--f);
  font-size: 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  outline: none;
  caret-color: var(--primary);
  transition: border-color .18s, box-shadow .18s;
  margin-bottom: 8px;
}
.minput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.minput::placeholder { color: var(--muted); font-size: 13px; }

.file-drop {
  width: 100%;
  border: 1.5px dashed var(--border);
  border-radius: var(--r);
  padding: 18px;
  text-align: center;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  position: relative;
}
.file-drop:hover { border-color: #C4C0FF; background: var(--primary-light); }
.file-drop input[type=file] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}
.file-drop-txt {
  font-size: 13px;
  color: var(--text2);
  font-weight: 500;
  pointer-events: none;
}
.file-drop-txt small {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}

.music-controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.vol-row { display: flex; align-items: center; gap: 8px; flex: 1; }
.vol-lbl { font-size: 10px; font-weight: 700; letter-spacing: .5px; color: var(--muted); white-space: nowrap; text-transform: uppercase; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  transition: background .18s;
}
input[type=range]::-webkit-slider-thumb:hover { background: var(--primary-dark); }

.music-status {
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  text-align: center;
  min-height: 16px;
  font-weight: 500;
}
.music-status.playing { color: var(--ok); }

/* ── DONE OVERLAY ── */
#done-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(247,245,242,.94);
  backdrop-filter: blur(20px);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  padding: 40px 28px;
}
#done-overlay.show { display: flex; }

.done-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary);
  background: var(--primary-light);
  border: 1.5px solid #C4C0FF;
  border-radius: 999px;
  padding: 6px 16px;
}
.done-h {
  font-family: var(--fD);
  font-size: clamp(48px, 13vw, 72px);
  font-style: italic;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
  color: var(--text);
}
.done-h em { font-style: normal; color: var(--primary); }

.done-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--rL);
  padding: 24px 48px;
  box-shadow: 0 4px 32px rgba(0,0,0,.08);
}
.done-score {
  font-size: 64px;
  font-weight: 800;
  letter-spacing: -3px;
  color: var(--gold);
  line-height: 1;
}
.done-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 6px;
  font-weight: 500;
}

.btn-restart {
  font-family: var(--f);
  font-size: 15px;
  font-weight: 700;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 15px 48px;
  cursor: pointer;
  margin-top: 4px;
  transition: background .18s;
}
.btn-restart:hover { background: var(--primary-dark); }
.btn-restart:active { transform: scale(.97); }

/* ── CONFETTI ── */
.cc-layer { position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden; }
.cc { position: absolute; border-radius: 3px; animation: ccfall linear forwards; }
@keyframes ccfall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to { transform: translateY(105vh) rotate(540deg); opacity: 0; }
}

/* ── DARK THEME ── */
body.dark {
  --bg: #111116;
  --surface: #1C1C22;
  --border: #2A2A33;
  --text: #F0EEF8;
  --text2: #8B87A0;
  --muted: #52505F;
  --primary-light: rgba(108,99,255,.12);
  --ok-bg: rgba(34,197,94,.08);
  --ok-border: rgba(34,197,94,.2);
  --err-bg: rgba(239,68,68,.08);
  --err-border: rgba(239,68,68,.2);
}
body.dark #done-overlay { background: rgba(17,17,22,.95); }
body.dark input#answer { background: var(--surface); }
body.dark .minput { background: var(--surface); }
body.dark .tab:not(.active) { background: var(--surface); }
body.dark .prog-track { background: var(--border); }
body.dark input[type=range] { background: var(--border); }
</style>
</head>
<body>

<audio id="bgm" loop></audio>
<div class="cc-layer" id="ccLayer"></div>

<!-- DONE OVERLAY -->
<div id="done-overlay">
  <div class="done-badge">Sesi Selesai 🎉</div>
  <div class="done-h">Vocab<em>Gacor</em></div>
  <div class="done-card">
    <div class="done-score" id="doneScore">0</div>
    <div class="done-sub" id="doneSub">dari 129 kata · — akurasi</div>
  </div>
  <button class="btn-restart" onclick="restart()">Ulangi Lagi</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">Vocab<span>Gacor</span></div>
  <button class="theme-btn" onclick="toggleTheme()" title="Ganti tema">◐</button>
</div>

<!-- CONTENT -->
<div class="wrap">

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt" id="progTxt">1 / 129</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Kata ke</div>
      <div class="stat-val c-primary" id="sIdx">1</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Skor</div>
      <div class="stat-val c-gold" id="sScore">0</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Akurasi</div>
      <div class="stat-val" id="sAcc">—</div>
    </div>
  </div>

  <!-- Main Card -->
  <div class="card" id="mainCard">
    <div class="word-hero">
      <div class="combo-pill" id="comboPill">🔥 combo</div>
      <div class="word-tag">English → Indonesia</div>
      <div id="word">—</div>
    </div>
    <div class="input-zone">
      <div class="input-wrap">
        <span class="inp-label">ID</span>
        <input type="text" id="answer"
          placeholder="Tulis arti bahasa Indonesia…"
          autocomplete="off" autocorrect="off"
          autocapitalize="none" spellcheck="false">
        <span class="inp-status" id="inpStatus"></span>
      </div>
      <div class="hint-row" id="hintRow">Enter untuk cek · Tab untuk lewati</div>
      <div class="btn-row">
        <button class="btn-main" id="mainBtn" onclick="onCheck()">Cek Jawaban</button>
        <button class="btn-skip" onclick="onSkip()">Lewati →</button>
      </div>
      <div class="result-area" id="resultArea"></div>
    </div>
  </div>

  <!-- Music Panel -->
  <div class="music-panel">
    <div class="music-header">♪ Musik Latar</div>

    <div class="music-tabs">
      <div class="tab active" id="tabUrl" onclick="switchTab('url')">Link URL</div>
      <div class="tab" id="tabFile" onclick="switchTab('file')">Upload File</div>
    </div>

    <div id="zoneUrl">
      <input class="minput" id="musicUrl" placeholder="Paste link MP3 langsung…" type="url">
      <div style="display:flex;gap:8px;">
        <button class="btn-main" style="flex:1;padding:10px;font-size:13px;" onclick="loadUrl()">Muat</button>
        <button class="btn-skip" style="padding:10px 14px;font-size:13px;" onclick="togglePlay()" id="playBtn">▶ Play</button>
      </div>
    </div>

    <div id="zoneFile" style="display:none;">
      <div class="file-drop" id="fileDrop">
        <input type="file" id="fileInput" accept="audio/*" onchange="loadFile(this)">
        <div class="file-drop-txt">
          Klik atau seret file audio ke sini
          <small>MP3, WAV, OGG, M4A</small>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn-main" style="flex:1;padding:10px;font-size:13px;" onclick="togglePlay()" id="playBtn2">▶ Play</button>
        <button class="btn-skip" style="padding:10px 14px;font-size:13px;" onclick="stopMusic()">■ Stop</button>
      </div>
    </div>

    <div class="music-controls">
      <div class="vol-row">
        <span class="vol-lbl">Vol</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.4" oninput="setVol(this.value)">
      </div>
    </div>
    <div class="music-status" id="musicStatus">Belum ada musik dimuat</div>
  </div>

</div><!-- .wrap -->

<script>
/* ═══ DATA ═══ */
const vocab = [
  {en:"Abnormality",id:["kelainan","ketidaknormalan"]},
  {en:"Advantage",id:["keuntungan","kelebihan","manfaat"]},
  {en:"Algorithm",id:["algoritma","urutan logis"]},
  {en:"Allow",id:["mengizinkan","membolehkan","memungkinkan"]},
  {en:"Amount",id:["jumlah","banyaknya"]},
  {en:"Analyze",id:["menganalisis","memeriksa"]},
  {en:"Application",id:["aplikasi","penerapan","penggunaan"]},
  {en:"Artificial",id:["buatan","tiruan","artifisial"]},
  {en:"Assist",id:["membantu","menolong"]},
  {en:"Benefit",id:["manfaat","keuntungan","kepentingan"]},
  {en:"Blend",id:["mencampur","memadukan","campuran"]},
  {en:"Cell",id:["sel","bilik"]},
  {en:"Challenge",id:["tantangan","menantang"]},

/* ═══ STATE ═══ */
let idx = 0, score = 0, answered = 0, combo = 0;
let checked = false, hasAnswered = false;

const SVG_OK = `<svg viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9.5 10.5,2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SVG_ERR = `<svg viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;

/* ═══ THEME ═══ */
function toggleTheme() { document.body.classList.toggle('dark'); }

/* ═══ SHUFFLE (Fisher-Yates) ═══ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ═══ COMBO ═══ */
function updateCombo(ok) {
  const pill = document.getElementById('comboPill');
  if (ok) {
    combo++;
    if (combo >= 3) {
      pill.textContent = `🔥 ${combo}× combo`;
      pill.classList.add('show');
      pill.classList.remove('pop'); void pill.offsetWidth; pill.classList.add('pop');
    }
  } else {
    combo = 0;
    pill.classList.remove('show');
  }
}

/* ═══ STATS ═══ */
function updateStats() {
  document.getElementById('sIdx').textContent = idx + 1;
  document.getElementById('sScore').textContent = score;
  const pct = answered > 0 ? Math.round(score / answered * 100) + '%' : '—';
  document.getElementById('sAcc').textContent = pct;
  const fillPct = Math.round((idx + 1) / vocab.length * 100);
  document.getElementById('progFill').style.width = fillPct + '%';
  document.getElementById('progTxt').textContent = `${idx + 1} / ${vocab.length}`;
}

function bumpEl(id) {
  const el = document.getElementById(id);
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}

/* ═══ CARD STATE ═══ */
function setCard(s) {
  const c = document.getElementById('mainCard');
  c.classList.remove('s-ok', 's-err');
  if (s) c.classList.add('s-' + s);
}

function setIcon(type) {
  const el = document.getElementById('inpStatus');
  el.className = 'inp-status';
  el.innerHTML = '';
  if (!type) return;
  el.classList.add('vis', type);
  el.innerHTML = type === 'ok' ? SVG_OK : SVG_ERR;
}

/* ═══ LOAD WORD ═══ */
function loadWord() {
  const wordEl = document.getElementById('word');
  wordEl.classList.add('fade');
  setTimeout(() => {
    wordEl.textContent = vocab[idx].en;
    wordEl.classList.remove('fade');
  }, 150);

  const inp = document.getElementById('answer');
  inp.value = ''; inp.className = ''; inp.disabled = false;
  setIcon(null); setCard(null);
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('hintRow').textContent = 'Enter untuk cek · Tab untuk lewati';
  document.getElementById('mainBtn').textContent = 'Cek Jawaban';
  checked = false; hasAnswered = false;
  updateStats();
  setTimeout(() => inp.focus(), 180);
}

/* ═══ CHECK ═══ */
function onCheck() {
  if (checked) { onSkip(); return; }

  const inp = document.getElementById('answer');
  const raw = inp.value.toLowerCase().trim();
  const valids = vocab[idx].id.map(v => v.toLowerCase());
  const ra = document.getElementById('resultArea');

  if (!raw) {
    ra.innerHTML = `<div class="rbox warn"><div class="rlbl">Isi jawabannya dulu ✦</div></div>`;
    return;
  }

  checked = true;
  inp.disabled = true;

  const correct = valids.includes(raw);

  if (correct) {
    inp.classList.add('i-ok');
    setIcon('ok');
    setCard('ok');
    ra.innerHTML = `<div class="rbox ok"><div class="rlbl">✓ Benar!</div><div class="rans">${vocab[idx].id.join(' · ')}</div></div>`;
    document.getElementById('hintRow').textContent = 'Keren! Melanjutkan…';
    document.getElementById('mainBtn').textContent = 'Lanjut →';

    if (!hasAnswered) {
      score++;
      hasAnswered = true;
      answered++;
      bumpEl('sScore');
      updateStats();
      updateCombo(true);
    }

    setTimeout(onSkip, 1300);
  } else {
    inp.classList.add('i-err');
    setIcon('err');
    setCard('err');
    ra.innerHTML = `<div class="rbox err"><div class="rlbl">✗ Salah</div><div class="rans">${vocab[idx].id.join(' · ')}</div></div>`;
    document.getElementById('hintRow').textContent = 'Enter lagi atau klik Lanjut';
    document.getElementById('mainBtn').textContent = 'Lanjut →';

    if (!hasAnswered) {
      hasAnswered = true;
      answered++;
      updateStats();
      updateCombo(false);
    }

    inp.disabled = false;
    setTimeout(() => inp.focus(), 60);
  }
}

/* ═══ SKIP ═══ */
function onSkip() {
  idx++;
  if (idx >= vocab.length) {
    const acc = answered > 0 ? Math.round(score / answered * 100) + '%' : '—';
    document.getElementById('doneScore').textContent = score;
    document.getElementById('doneSub').textContent = `dari ${vocab.length} kata · ${acc} akurasi`;
    document.getElementById('done-overlay').classList.add('show');
    spawnConfetti();
    return;
  }
  loadWord();
}

/* ═══ RESTART ═══ */
function restart() {
  document.getElementById('done-overlay').classList.remove('show');
  document.getElementById('ccLayer').innerHTML = '';
  idx = 0; score = 0; answered = 0; combo = 0;
  document.getElementById('comboPill').classList.remove('show');
  shuffle(vocab);
  loadWord();
}

/* ═══ CONFETTI ═══ */
function spawnConfetti() {
  const layer = document.getElementById('ccLayer');
  const cols = ['#6C63FF','#F59E0B','#22C55E','#EF4444','#38BDF8','#F472B6'];
  for (let i = 0; i < 90; i++) {
    const d = document.createElement('div');
    d.className = 'cc';
    d.style.cssText = `left:${Math.random()*100}vw;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*1.5}s;`;
    layer.appendChild(d);
  }
}

/* ═══ KEYBOARD ═══ */
document.getElementById('answer').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); onCheck(); }
  if (e.key === 'Tab') { e.preventDefault(); onSkip(); }
});

/* ═══ MUSIC ═══ */
const bgm = document.getElementById('bgm');
let isPlaying = false;
bgm.volume = 0.4;

function setVol(v) { bgm.volume = parseFloat(v); }

function switchTab(t) {
  document.getElementById('tabUrl').classList.toggle('active', t === 'url');
  document.getElementById('tabFile').classList.toggle('active', t === 'file');
  document.getElementById('zoneUrl').style.display = t === 'url' ? '' : 'none';
  document.getElementById('zoneFile').style.display = t === 'file' ? '' : 'none';
}

function loadUrl() {
  const url = document.getElementById('musicUrl').value.trim();
  if (!url) { setStatus('Masukkan URL terlebih dahulu', ''); return; }
  bgm.src = url;
  bgm.load();
  bgm.play()
    .then(() => { isPlaying = true; setPlayBtns('⏸ Pause'); setStatus('Memutar…', 'playing'); })
    .catch(() => setStatus('Gagal memutar. Coba URL MP3 langsung.', ''));
}

function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  bgm.src = URL.createObjectURL(file);
  bgm.load();
  document.querySelector('#fileDrop .file-drop-txt').textContent = '✓ ' + file.name;
  setStatus('File dimuat: ' + file.name.slice(0, 40), '');
}

function togglePlay() {
  if (!bgm.src) { setStatus('Muat musik dulu ya!', ''); return; }
  if (isPlaying) {
    bgm.pause(); isPlaying = false;
    setPlayBtns('▶ Play'); setStatus('Dijeda', '');
  } else {
    bgm.play()
      .then(() => { isPlaying = true; setPlayBtns('⏸ Pause'); setStatus('Memutar…', 'playing'); })
      .catch(() => setStatus('Gagal memutar', ''));
  }
}

function stopMusic() {
  bgm.pause(); bgm.currentTime = 0; isPlaying = false;
  setPlayBtns('▶ Play'); setStatus('Dihentikan', '');
}

function setPlayBtns(txt) {
  ['playBtn','playBtn2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = txt;
  });
}

function setStatus(msg, cls) {
  const el = document.getElementById('musicStatus');
  el.textContent = msg;
  el.className = 'music-status' + (cls ? ' ' + cls : '');
}

bgm.addEventListener('ended', () => { setStatus('Selesai', ''); isPlaying = false; setPlayBtns('▶ Play'); });

/* ═══ INIT ═══ */
window.onload = () => { shuffle(vocab); loadWord(); };
</script>
